<form id="registerForm" class="event-form">
    <h2>Реєстрація</h2>
    <label>Ім'я: <input type="text" id="regName" required></label>
    <label>Email: <input type="email" id="regEmail" required></label>
    <label>Пароль: <input type="password" id="regPass" required></label>

    <label>
        Хто ви?
        <select id="regRole">
            <option value="user">Глядач (шукаю події)</option>
            <option value="organizer">Організатор (створюю події)</option>
        </select>
    </label>

    <button type="submit" class="submit-btn">Зареєструватися</button>
</form>

<section class="section">
    <div class="container single-wrap">
        <h1 id="evTitle" class="center-text">Завантаження...</h1>

        <div class="event-main-info">
            <img id="evImg" class="event-image" src="images/placeholder.jpg" alt="Подія">

            <div class="event-details-box">
                <p><i class="fa-solid fa-calendar-days"></i> <strong>Дата:</strong> <span id="evDate">---</span></p>
                <p><i class="fa-solid fa-layer-group"></i> <strong>Категорія:</strong> <span id="evType">---</span></p>
                <p><i class="fa-solid fa-location-dot"></i> <strong>Локація:</strong> <span id="locName">---</span></p>
                <p><i class="fa-solid fa-phone"></i> <strong>Контакти:</strong> <span id="locContacts">---</span></p>
            </div>
        </div>

        <div class="event-full-desc">
            <h3>Про подію</h3>
            <p id="evDesc">Опис завантажується...</p>
        </div>

        <!-- карта -->
        <div class="map-frame">
            <div id="mapSingle" style="height: 400px; width: 100%;"></div>
        </div>

        <div class="venue-nav">
            <a href="events.html" class="btn nav-btn">← До всіх подій</a>
            <a href="index.html#map-section" class="btn nav-btn">← На карту подій</a>
        </div>
    </div>
</section>
